<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body {
            overflow: hidden; /* Evita scroll accidental */
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* HEADER COMPACTO */
        header { text-align: center; padding: 10px 0; width: 100%; position: relative; }
        .btn-share-top { 
            position: absolute; top: 10px; right: 15px; 
            background: var(--gris-claro); color: var(--negro-suave);
            border: none; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 0.9rem; z-index: 10;
        }
        .app-logo { height: 80px; width: auto; } 
        .school-info { color: #666; font-size: 0.7rem; line-height: 1.1; margin-bottom: 5px; }

        .menu-container { width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 8px; }
        .section-title { 
            font-weight: bold; font-size: 0.75rem; color: #555; 
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-top: 5px; margin-bottom: 2px;
            border-bottom: 1px solid var(--gris-claro); padding-bottom: 2px;
        }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 12px 10px; border-radius: 12px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }

        /* MODALES Y PANTALLAS */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: flex; }

        .popup-card {
            width: 90%; max-width: 360px; background: white;
            border-radius: 25px; padding: 20px; text-align: center;
            position: relative; max-height: 90vh; overflow-y: auto;
        }

        .full-page-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .full-page-detail.show { display: flex; }

        .back-nav {
            position: sticky; top: 0; background: white; padding: 15px;
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            border-bottom: 1px solid #eee; z-index: 10; cursor: pointer;
        }

        .detail-img { width: 100%; height: auto; display: block; }
        .detail-body { padding: 20px; }
        .detail-title { color: var(--rojo-principal); margin-bottom: 10px; font-size: 1.3rem; }
        .detail-text { font-size: 0.95rem; line-height: 1.5; color: #333; white-space: pre-line; }

        .close-modal-x { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #bbb; cursor: pointer; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-service, .btn-cat {
            background: #f8f9fa; border: 1.2px solid #eee; padding: 10px 5px;
            border-radius: 12px; font-weight: 600; font-size: 0.7rem;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .btn-package { grid-column: span 2; padding: 12px; font-size: 0.9rem; }

        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px 0; display: flex; justify-content: center; gap: 30px; border-top: 1px solid #eee; }
        footer a { font-size: 24px; }

        /* INSTALACIÓN */
        #install-mini-card {
            position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; background: white;
            padding: 10px; border-radius: 15px; display: none;
            align-items: center; justify-content: space-between; gap: 10px;
            z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <button class="btn-share-top" onclick="compartirAppGeneral()">
            <i class="fas fa-share-nodes"></i>
        </button>
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <img src="logo.png" alt="Logo" class="app-logo">
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Moto</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Auto</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <button class="btn" onclick="abrirClases()">Paquetes de Manejo</button>
        <button class="btn" onclick="abrirAlquiler()">Alquiler de vehículos</button>
        <button class="btn" onclick="abrirServicios()">Otros servicios</button>
        <button class="btn btn-dark" onclick="abrirApelaciones()">Apelación o prescripción</button>
    </div>

    <div id="install-mini-card">
        <div style="color: var(--rojo-principal); font-size: 1.1rem;"><i class="fas fa-mobile-screen"></i></div>
        <div style="flex:1; font-size: 0.8rem; font-weight: 500;" id="install-text-msg">Instala la App en tu inicio</div>
        <button id="btn-install-mini" class="btn" style="padding: 5px 8px; font-size: 0.7rem;">Instalar</button>
        <i class="fas fa-times" onclick="this.parentElement.style.display='none'" style="color:#ccc; cursor:pointer;"></i>
    </div>

    <div id="full-detail-page" class="full-page-detail">
        <div class="back-nav" onclick="cerrarDetalle()">
            <i class="fas fa-arrow-left"></i> Volver
        </div>
        <img id="p-img" src="" alt="" class="detail-img">
        <div class="detail-body">
            <h3 id="p-titulo" class="detail-title"></h3>
            <div id="p-info" class="detail-text"></div>
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="contactarAccion()">
                <i class="fab fa-whatsapp"></i> <span id="btn-whatsapp-text">Consultar ahora</span>
            </button>
        </div>
    </div>

    <div id="classes-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarClases()"></i>
            <h3 style="margin:0 0 10px 0; color:var(--rojo-principal); font-size: 1.1rem;">Selecciona un Paquete</h3>
            <div class="service-grid">
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('desdecero')">Desde cero</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('principiante')">Principiante</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('intermedio')">Intermedio</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('avanzado')">Avanzado</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('enmano')">Licencia en mano</button>
            </div>
        </div>
    </div>

    <div id="rental-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarAlquiler()"></i>
            <h3 style="margin:0 0 10px 0; color:var(--rojo-principal); font-size: 1.1rem;">Alquiler de Vehículo</h3>
            <div class="service-grid">
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B1')">B1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B2')">B2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B3')">B3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B4')">B4</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A1')">A1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A2')">A2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A3')">A3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler C2')">C2</button>
            </div>
        </div>
    </div>

    <div id="services-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarServicios()"></i>
            <h3 style="margin:0 0 10px 0; color:var(--rojo-principal); font-size: 1.1rem;">Otros Servicios</h3>
            <div class="service-grid">
                <button class="btn-service" onclick="contactarWhatsApp('Renovación')"><i class="fas fa-id-card"></i> Renovación</button>
                <button class="btn-service" onclick="contactarWhatsApp('Permiso temporal')"><i class="fas fa-clock"></i> Permiso</button>
                <button class="btn-service" onclick="contactarWhatsApp('Citas')"><i class="fas fa-calendar-alt"></i> Citas</button>
                <button class="btn-service" onclick="contactarWhatsApp('Dictamen médico')"><i class="fas fa-stethoscope"></i> Dictamen</button>
            </div>
        </div>
    </div>

    <div id="quiz-container" style="display:none; padding:20px; overflow-y: auto; height: 100vh; background:white;">
        <div id="question-number" style="color:var(--rojo-principal); font-weight:bold; text-align:center;"></div>
        <div id="question-text" style="font-weight:bold; margin:20px 0; text-align:center;"></div>
        <div id="options-container"></div>
    </div>

    <footer id="mainFooter">
        <a href="https://www.tiktok.com/@christianescuelademanejo" target="_blank" class="fa-tiktok"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/share/1FY2w4BgwW/" target="_blank" class="fa-facebook"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/escuelademanejocr.christian" target="_blank" class="fa-instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103" target="_blank" class="fa-whatsapp"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        let preguntasSimulacro = [];
        let index = 0; let puntos = 0; let bloquearOpciones = false;
        let whatsappMsgGlobal = "";
        let whatsappNumGlobal = "50672408103";

        function compartirAppGeneral() {
            const text = `¡Instala la App Teórico CR tú tambien! https://abre.ai/teoricocr`;
            if (navigator.share) navigator.share({ text: text });
            else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        // --- INSTALACIÓN ---
        let deferredPrompt;
        const installCard = document.getElementById('install-mini-card');
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                document.getElementById('install-text-msg').innerText = "Toca 'Compartir' y 'Añadir a inicio'";
                document.getElementById('btn-install-mini').style.display = "none";
                setTimeout(() => installCard.style.display = "flex", 3000);
            }
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            setTimeout(() => installCard.style.display = "flex", 3000);
        });
        document.getElementById('btn-install-mini').onclick = async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); installCard.style.display='none'; }
        };

        // --- PAQUETES DATOS ---
        const dataPaquetes = {
            'desdecero': { titulo: '🔴 Paquete 12 horas – Desde Cero', imagen: 'desdecero.jpeg', info: `Pensado para iniciar desde cero.\n\n🚗 Incluye:\n✔ 12 horas de práctica\n✔ Vehículo para prueba\n✔ Circuito réplica COSEVI\n✔ Rutas reales` },
            'principiante': { titulo: '🟠 Paquete 8 horas – Principiantes', imagen: 'principiantes.jpeg', info: `Para aumentar probabilidades de aprobar.\n\n🚗 Incluye:\n✔ 8 horas de práctica\n✔ Vehículo para prueba\n✔ Entrenamiento en circuito` },
            'intermedio': { titulo: '🟡 Paquete 4 horas – Nivel Intermedio', imagen: 'intermedio.jpeg', info: `Para perfeccionar técnica.\n\n🚗 Incluye:\n✔ 4 horas de práctica\n✔ Simulación de examen\n✔ Tips prácticos` },
            'avanzado': { titulo: '🔹 Alquiler + 1 hora de práctica', imagen: 'avanzado.jpeg', info: `Para reforzar seguridad.\n\n🚗 Incluye:\n✔ 1 hora personalizada\n✔ Vehículo automático\n✔ Enfoque en puntos débiles` },
            'enmano': { titulo: '🎉 LICENCIA EN MANO 🎉', imagen: 'enmano.jpeg', info: `Nos encargamos de TODO.\n\n✔️ Enteros del banco pagos\n✔️ Citas gestionadas\n✔️ Clases ILIMITADAS\n✔️ Vehículo incluido` }
        };

        function contactarWhatsApp(detalle, num = "50672408103") {
            window.open(`https://wa.me/${num}?text=${encodeURIComponent("Hola. Información sobre: " + detalle)}`, '_blank');
        }

        function abrirClases() { document.getElementById('classes-overlay').classList.add('show'); }
        function cerrarClases() { document.getElementById('classes-overlay').classList.remove('show'); }
        function abrirAlquiler() { document.getElementById('rental-overlay').classList.add('show'); }
        function cerrarAlquiler() { document.getElementById('rental-overlay').classList.remove('show'); }
        function abrirServicios() { document.getElementById('services-overlay').classList.add('show'); }
        function cerrarServicios() { document.getElementById('services-overlay').classList.remove('show'); }

        function abrirDetallePaquete(id) {
            const p = dataPaquetes[id];
            whatsappMsgGlobal = p.titulo; whatsappNumGlobal = "50672408103";
            document.getElementById('p-img').src = p.image || p.imagen;
            document.getElementById('p-titulo').innerText = p.titulo;
            document.getElementById('p-info').innerText = p.info;
            document.getElementById('btn-whatsapp-text').innerText = "Consultar ahora";
            document.getElementById('full-detail-page').classList.add('show');
            cerrarClases();
        }

        function abrirApelaciones() {
            whatsappMsgGlobal = "Apelación de infracciones"; whatsappNumGlobal = "50663784552";
            document.getElementById('p-img').src = 'apelaciones.png';
            document.getElementById('p-titulo').innerText = 'Apelación o Prescripción';
            document.getElementById('p-info').innerText = 'Asesoría legal para gestión de multas de tránsito. Evaluamos su caso para apelación o prescripción.';
            document.getElementById('btn-whatsapp-text').innerText = "Consulta gratis";
            document.getElementById('full-detail-page').classList.add('show');
        }

        function cerrarDetalle() { document.getElementById('full-detail-page').classList.remove('show'); }
        function contactarAccion() { contactarWhatsApp(whatsappMsgGlobal, whatsappNumGlobal); }

        function iniciarExamen(tipo) {
            document.body.style.overflow = "auto";
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            let fuente = (tipo === 'moto') ? (typeof bancoPreguntasMoto !== 'undefined' ? bancoPreguntasMoto : bancoPreguntasmoto) : bancoPreguntas;
            preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0; mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.innerHTML = opt;
                b.style.cssText = "width:100%; padding:12px; margin-bottom:8px; border-radius:10px; border:1px solid #ddd; background:#f9f9f9; text-align:left;";
                b.onclick = () => {
                    if (bloquearOpciones) return; bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.style.backgroundColor = '#d4edda'; } 
                    else { b.style.backgroundColor = '#f8d7da'; container.children[p.correcta].style.backgroundColor = '#d4edda'; }
                    setTimeout(() => { index++; if(index < 40) mostrarPregunta(); else location.reload(); }, 600);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
