<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-principal: #e31e24;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
        }

        html, body {
            overflow-x: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Banner de Instalación */
        #installBanner {
            display: none;
            width: 100%;
            background: var(--negro-suave);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            z-index: 1000;
        }
        #btnInstall {
            background: var(--rojo-principal);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        header {
            text-align: center;
            padding: 15px 10px 10px 10px;
            flex-shrink: 0;
        }

        .header-title { color: #333; margin: 0; font-size: 1.2rem; font-weight: bold; line-height: 1; }
        .header-subtitle { color: #666; font-size: 0.9rem; margin-top: 2px; }
        
        .app-logo {
            height: 55px;
            width: auto;
            margin: 8px auto;
            display: block;
        }

        .app-name-text { font-weight: bold; font-size: 1.1rem; color: #000; margin-bottom: 10px; }

        /* Contenedor de botones principal */
        .menu-container {
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 90px;
        }

        .exam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background-color: var(--rojo-principal);
            color: white;
            border: none;
            padding: 14px 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            cursor: pointer;
        }

        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }

        /* --- ESTILOS DEL EXAMEN --- */
        #quiz-container {
            width: 92%;
            max-width: 450px;
            margin-top: 20px;
            padding-bottom: 100px;
        }

        .option-btn {
            background-color: var(--gris-claro);
            color: var(--negro-suave);
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            display: block;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .option-btn:active { background-color: #e0e0e0; }

        #result-container {
            text-align: center;
            padding: 40px 20px;
        }

        /* Footer fijo */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 35px;
            border-top: 1px solid #eee;
            z-index: 999;
        }

        footer a { color: #555; font-size: 24px; text-decoration: none; }
        .fa-whatsapp { color: #25D366; }
    </style>
</head>
<body>

    <div id="installBanner">
        ¿Instalar Teórico CR en tu inicio? 
        <button id="btnInstall">INSTALAR</button>
    </div>

    <header id="mainHeader">
        <div class="header-title">Escuela de manejo CR</div>
        <div class="header-subtitle">San Ramón</div>
        <img src="logo.png" alt="Teórico CR" class="app-logo">
        <div class="app-name-text">Teórico CR</div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="exam-grid">
            <a href="#" class="btn" onclick="iniciarExamen()"><i class="fas fa-motorcycle"></i> Moto</a>
            <a href="#" class="btn" onclick="iniciarExamen()"><i class="fas fa-car"></i> Auto</a>
        </div>
        <a href="https://wa.me/50672408103?text=Hola" class="btn">Curso Virtual Personalizado</a>
        <a href="https://wa.me/50672408103?text=Hola" class="btn">Material Didáctico Resumido</a>
        <a href="#" class="btn">Clases de Manejo B1</a>
        <a href="#" class="btn">Alquiler San Ramón</a>
        <a href="https://wa.me/50663784552?text=Hola" class="btn btn-dark">Apelación de Infracciones</a>
        <a href="#" class="btn">Otros Servicios</a>
    </div>

    <div id="quiz-container" style="display:none;">
        <div id="question-number" style="font-size: 0.9rem; color: var(--rojo-principal); font-weight: bold; margin-bottom: 10px;"></div>
        <div id="question-text" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 25px; color: #222;"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container" style="display:none;">
        <h2 id="result-score" style="font-size: 3rem; margin: 0;"></h2>
        <p id="result-message"></p>
        <button onclick="location.reload()" class="btn" style="width: 100%; margin-top: 20px;">Finalizar</button>
    </div>

    <footer>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script>
        let preguntasSeleccionadas = [];
        let indiceActual = 0;
        let aciertos = 0;

        function iniciarExamen() {
            // Mezclar y seleccionar 40 preguntas del banco en preguntas.js
            preguntasSeleccionadas = [...bancoPreguntas].sort(() => 0.5 - Math.random()).slice(0, 40);
            indiceActual = 0;
            aciertos = 0;
            
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            const p = preguntasSeleccionadas[indiceActual];
            document.getElementById('question-number').innerText = `PREGUNTA ${indiceActual + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            p.opciones.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => verificarRespuesta(i);
                container.appendChild(btn);
            });
            window.scrollTo(0,0);
        }

        function verificarRespuesta(opcionElegida) {
            if (opcionElegida === preguntasSeleccionadas[indiceActual].correcta) {
                aciertos++;
            }
            
            indiceActual++;
            if (indiceActual < 40) {
                mostrarPregunta();
            } else {
                mostrarResultado();
            }
        }

        function mostrarResultado() {
            document.getElementById('quiz-container').style.display = 'none';
            const resCon = document.getElementById('result-container');
            resCon.style.display = 'block';
            
            const porcentaje = Math.round((aciertos / 40) * 100);
            document.getElementById('result-score').innerText = `${porcentaje}%`;
            
            const msg = document.getElementById('result-message');
            if (porcentaje >= 70) {
                msg.innerHTML = `<span style="color: green; font-weight: bold;">¡APROBADO!</span><br>Has superado el simulacro con ${aciertos} aciertos.`;
            } else {
                msg.innerHTML = `<span style="color: var(--rojo-principal); font-weight: bold;">REPROBADO</span><br>Necesitas al menos 70% para aprobar. Sigue estudiando.`;
            }
        }

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', () => {
            document.getElementById('installBanner').style.display = 'none';
            deferredPrompt.prompt();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
