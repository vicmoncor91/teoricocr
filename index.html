<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* FONDOS */
        body.fondo-auto { background-image: url('fondoexamen.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; background-blend-mode: overlay; background-color: rgba(255, 255, 255, 0.85); }
        body.fondo-moto { background-image: url('fondomoto.jpeg'); background-size: cover; background-position: center; background-attachment: fixed; background-blend-mode: overlay; background-color: rgba(255, 255, 255, 0.85); }

        header { text-align: center; padding: 15px 10px; width: 100%; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .app-logo { height: 80px; width: auto; } 
        .app-name-text { font-weight: bold; font-size: 1.5rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .section-title { font-weight: bold; font-size: 0.9rem; color: #555; text-transform: uppercase; border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px; margin-top: 10px; }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }
        .btn-outline { background-color: transparent; border: 2px solid var(--rojo-principal); color: var(--rojo-principal); }

        /* MODALES ESTÁNDAR */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: flex; }

        .popup-card {
            width: 90%; max-width: 360px; background: white;
            border-radius: 25px; padding: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative;
        }

        /* PANTALLA COMPLETA DE DETALLES */
        .full-page-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .full-page-detail.show { display: flex; }

        .back-nav {
            position: sticky; top: 0; background: white; padding: 15px;
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            font-size: 1.1rem; border-bottom: 1px solid #eee; z-index: 10;
        }

        .detail-img { width: 100%; height: auto; display: block; }
        .detail-body { padding: 20px; padding-bottom: 40px; }
        .detail-title { color: var(--rojo-principal); margin-bottom: 15px; font-size: 1.4rem; line-height: 1.3; }
        .detail-text { font-size: 1rem; line-height: 1.6; color: #333; white-space: pre-line; }

        .close-modal-x { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #bbb; cursor: pointer; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-service, .btn-cat {
            background: #f8f9fa; border: 1.5px solid #eee; padding: 12px 5px;
            border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.8rem;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-package { grid-column: span 2; padding: 15px; font-size: 1rem; }

        /* QUIZ */
        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        .option-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #f9f9f9; text-align: left; 
            font-size: 1rem; cursor: pointer; display: flex; gap: 12px;
        }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito); }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal); }

        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 0; display: flex; justify-content: center; gap: 35px; border-top: 1px solid #eee; z-index: 900;}
        footer a { font-size: 26px; text-decoration: none; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba teórica</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <button class="btn" onclick="abrirClases()">Paquetes de Clases de Manejo</button>
        <button class="btn" onclick="abrirAlquiler()">Alquiler de vehículos (San Ramón)</button>
        <button class="btn" onclick="abrirServicios()">Otros servicios</button>
        <a href="https://wa.me/50663784552?text=Hola.%20Asesoría%20sobre%20apelación%20o%20prescripción%20de%20infracciones" class="btn btn-dark">Apelación o prescripción de infracciones</a>
    </div>

    <div id="classes-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarClases()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Paquetes de Manejo</h3>
            <div class="service-grid">
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('desdecero')">Desde cero</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('principiante')">Principiante</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('intermedio')">Intermedio</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('avanzado')">Avanzado</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('enmano')">Licencia en mano</button>
            </div>
        </div>
    </div>

    <div id="full-detail-page" class="full-page-detail">
        <div class="back-nav" onclick="cerrarDetalle()">
            <i class="fas fa-arrow-left"></i> Volver a paquetes
        </div>
        <img id="p-img" src="" alt="Imagen" class="detail-img">
        <div class="detail-body">
            <h3 id="p-titulo" class="detail-title"></h3>
            <div id="p-info" class="detail-text"></div>
            <button class="btn" style="width: 100%; margin-top: 30px;" onclick="contactarPaquete()">
                <i class="fab fa-whatsapp"></i> Contactar por WhatsApp
            </button>
        </div>
    </div>

    <div id="rental-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarAlquiler()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Alquiler de Vehículo</h3>
            <div class="service-grid">
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B1')">B1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B2')">B2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B3')">B3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B4')">B4</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A1')">A1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A2')">A2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A3')">A3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler C2')">C2</button>
            </div>
        </div>
    </div>

    <div id="services-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarServicios()"></i>
            <h3 style="margin:0; color:var(--rojo-principal);">Otros Servicios</h3>
            <div class="service-grid">
                <button class="btn-service" onclick="contactarWhatsApp('Renovación')"><i class="fas fa-id-card"></i> Renovación</button>
                <button class="btn-service" onclick="contactarWhatsApp('Citas')"><i class="fas fa-calendar-alt"></i> Citas</button>
                <button class="btn-service" onclick="contactarWhatsApp('Dictamen')"><i class="fas fa-stethoscope"></i> Dictamen</button>
                <button class="btn-service" style="grid-column: span 2;" onclick="contactarWhatsApp('Rutas')"><i class="fas fa-map-marked-alt"></i> Reconocimiento de rutas</button>
            </div>
        </div>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: var(--rojo-principal); font-weight: bold; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status"></div>
        <div id="result-score" style="font-size: 3.5rem; font-weight: bold;"></div>
        <p id="result-message"></p>
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="compartirResultado()">Compartir</button>
        <button class="btn btn-outline" style="width:100%;" onclick="location.reload()">Reintentar</button>
    </div>

    <footer id="mainFooter">
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        let preguntasSimulacro = [];
        let index = 0; let puntos = 0; let bloquearOpciones = false;
        let paqueteActualTexto = "";

        const dataPaquetes = {
            'desdecero': {
                titulo: '🔴 Paquete 12 horas – Desde Cero',
                imagen: 'desdecero.jpeg',
                info: `Este paquete está pensado para personas que inician desde cero o que desean una preparación completa y sin estrés.

Aprenderás desde lo más básico hasta dominar todas las habilidades necesarias para aprobar con seguridad.

🚗 Incluye:
✔ 12 horas de práctica total
✔ Vehículo para realizar la prueba
✔ Entrenamiento progresivo paso a paso
✔ Circuito réplica COSEVI
✔ Rutas reales y simulación de examen
✔ Acompañamiento completo

💡 Perfecto si querés aprender bien desde el inicio y ganar confianza total.`
            },
            'principiante': {
                titulo: '🟠 Paquete 8 horas – Principiantes',
                imagen: 'principiantes.jpeg',
                info: `Una opción más intensiva para quienes quieren prepararse de forma completa y aumentar significativamente sus probabilidades de aprobar en el primer intento.

🚗 Incluye:
✔ 8 horas de práctica intensiva
✔ Vehículo para la prueba
✔ Entrenamiento en circuito tipo COSEVI
✔ Práctica en rutas reales
✔ Corrección continua con instructor

💡 Recomendado si querés sentirte seguro(a) en todo momento.`
            },
            'intermedio': {
                titulo: '🟡 Paquete 4 horas – Nivel Intermedio',
                imagen: 'intermedio.jpeg',
                info: `Este paquete está diseñado para personas que ya manejan, pero desean perfeccionar su técnica y aumentar su confianza antes del examen práctico.

🚗 Incluye:
✔ 4 horas de práctica
✔ Vehículo para realizar la prueba
✔ Simulación de examen
✔ Identificación de posibles “trampas”
✔ Tips prácticos para aprobar

💡 Ideal para pulir detalles y asegurar un mejor resultado.`
            },
            'avanzado': {
                titulo: '🔹 Alquiler + 1 hora de práctica',
                imagen: 'avanzado.jpeg',
                info: `Si ya tenés conocimientos básicos pero querés reforzar tu seguridad al volante, esta opción es ideal para vos.

🚗 Incluye:
✔ 1 hora de práctica personalizada
✔ Vehículo automático para realizar la prueba
✔ Tips para mejorar tu técnica
✔ Enfoque en puntos débiles

💡 Perfecto para quienes necesitan un último ajuste antes de la prueba.`
            },
            'enmano': {
                titulo: '🎉 PAQUETE LICENCIA EN MANO 🎉',
                imagen: 'enmano.jpeg',
                info: `203.000,00 CRC (Antes 290.000,00 CRC)

Olvidate de complicaciones, nosotros nos encargamos de TODO para que salgas manejando con tu licencia en mano ✅

Este paquete incluye:
✔️ Enteros del banco ya pagos 🏦
✔️ Citas gestionadas en COSEVI 📅
✔️ Clases de manejo ILIMITADAS hasta que te sintás seguro/a 💪
✔️ Vehículo cómodo y seguro para aprender 🚗
✔️ Vehículo para el día de la prueba oficial 🏁
✔️ Acompañamiento y asesoría en todo el proceso 🙌
✔️ Material de apoyo y consejos prácticos para aprobar a la primera 📘✨

📍 Contáctanos hoy y asegurá tu espacio.`
            }
        };

        function contactarWhatsApp(detalle) {
            window.open(`https://wa.me/50672408103?text=${encodeURIComponent("Hola Teórico CR. " + detalle)}`, '_blank');
        }

        function abrirClases() { document.getElementById('classes-overlay').classList.add('show'); window.history.pushState({ etapa: 'modal' }, ''); }
        function cerrarClases() { document.getElementById('classes-overlay').classList.remove('show'); }
        function abrirAlquiler() { document.getElementById('rental-overlay').classList.add('show'); window.history.pushState({ etapa: 'modal' }, ''); }
        function cerrarAlquiler() { document.getElementById('rental-overlay').classList.remove('show'); }
        function abrirServicios() { document.getElementById('services-overlay').classList.add('show'); window.history.pushState({ etapa: 'modal' }, ''); }
        function cerrarServicios() { document.getElementById('services-overlay').classList.remove('show'); }

        function abrirDetallePaquete(id) {
            const p = dataPaquetes[id];
            paqueteActualTexto = p.titulo;
            document.getElementById('p-img').src = p.imagen;
            document.getElementById('p-titulo').innerText = p.titulo;
            document.getElementById('p-info').innerText = p.info;
            document.getElementById('full-detail-page').classList.add('show');
            document.getElementById('classes-overlay').classList.remove('show');
            window.history.pushState({ etapa: 'detalle' }, '');
        }

        function cerrarDetalle() { document.getElementById('full-detail-page').classList.remove('show'); }
        function contactarPaquete() { contactarWhatsApp(`Me interesa el ${paqueteActualTexto}`); }

        function cerrarTodosModales() { 
            cerrarClases(); cerrarAlquiler(); cerrarServicios(); cerrarDetalle();
        }

        window.onpopstate = function() {
            if (document.getElementById('quiz-container').style.display === 'block') {
                if (confirm("¿Salir del examen?")) { location.reload(); } else { window.history.pushState({ etapa: 'examen' }, ''); }
            } else { cerrarTodosModales(); }
        };

        function iniciarExamen(tipo) {
            cerrarTodosModales();
            window.history.pushState({ etapa: 'examen' }, '');
            document.body.classList.remove('fondo-auto', 'fondo-moto');
            document.body.classList.add(tipo === 'auto' ? 'fondo-auto' : 'fondo-moto');
            let fuente = (tipo === 'moto') ? (typeof bancoPreguntasMoto !== 'undefined' ? bancoPreguntasMoto : bancoPreguntasmoto) : bancoPreguntas;
            preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `<b>${['A','B','C','D'][i]}</b> <span style="margin-left:10px">${opt}</span>`;
                b.onclick = () => {
                    if (bloquearOpciones) return;
                    bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.classList.add('correct'); } 
                    else { b.classList.add('incorrect'); container.children[p.correcta].classList.add('correct'); }
                    setTimeout(() => { index++; if(index < 40) mostrarPregunta(); else finalizar(); }, 650);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }

        function finalizar() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('mainFooter').style.display = 'flex';
            const nota = Math.round((puntos / 40) * 100);
            document.getElementById('result-score').innerText = nota;
            document.getElementById('result-score').style.color = nota > 69 ? 'var(--verde-exito)' : 'var(--rojo-principal)';
        }

        function compartirResultado() {
            const nota = document.getElementById('result-score').innerText;
            const text = `¡Saqué un ${nota} en Teórico CR! 🚗💨. Practica tú aquí: https://abre.ai/teoricocr`;
            if (navigator.share) navigator.share({ text: text }); else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
