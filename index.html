<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        header { text-align: center; padding: 15px 10px; width: 100%; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .app-logo { height: 80px; width: auto; } 
        .app-name-text { font-weight: bold; font-size: 1.5rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .section-title { 
            font-weight: bold; font-size: 0.9rem; color: #555; 
            text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px; margin-bottom: 5px;
            border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px;
        }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }

        /* --- MODALES --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: flex; }

        .popup-card {
            width: 90%; max-width: 360px; background: white;
            border-radius: 25px; padding: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative; animation: popIn 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-modal-x { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #bbb; cursor: pointer; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-service, .btn-cat {
            background: #f8f9fa; border: 1.5px solid #eee; padding: 10px 5px;
            border-radius: 12px; font-weight: 600; color: var(--negro-suave);
            cursor: pointer; transition: all 0.2s; font-size: 0.75rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-service i { color: var(--rojo-principal); font-size: 1.1rem; }
        .btn-service:active, .btn-cat:active { background: var(--rojo-principal); color: white; border-color: var(--rojo-principal); transform: scale(0.95); }
        .btn-service:active i { color: white; }

        .btn-package { grid-column: span 2; padding: 15px; font-size: 1rem; }

        /* --- EXAMEN --- */
        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        #question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #222; text-align: center; }
        .option-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #f9f9f9; text-align: left; 
            font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
        }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: bold; color: var(--rojo-principal); min-width: 22px; }

        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        .score-circle { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .status-badge { font-weight: bold; font-size: 1.4rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 0; display: flex; justify-content: center; gap: 35px; border-top: 1px solid #eee; z-index: 900;}
        footer a { font-size: 26px; text-decoration: none; }
        .fa-tiktok { color: var(--tiktok); } .fa-facebook { color: var(--facebook); } .fa-instagram { color: var(--instagram); } .fa-whatsapp { color: var(--whatsapp); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <button class="btn" onclick="abrirClases()">Paquetes de Clases de Manejo</button>
        <button class="btn" onclick="abrirAlquiler()">Alquiler de vehículos (San Ramón)</button>
        <button class="btn" onclick="abrirServicios()">Otros servicios</button>
        <a href="https://wa.me/50663784552?text=Hola.%20Asesoría%20sobre%20apelación%20o%20prescripción%20de%20infracciones" class="btn btn-dark">Apelación o prescripción de infracciones</a>
    </div>

    <div id="classes-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarClases()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Paquetes de Clases de Manejo</h3>
            <div class="service-grid">
                <button class="btn-service btn-package" onclick="contactarWhatsApp('Información sobre paquete: Desde cero')">Desde cero</button>
                <button class="btn-service btn-package" onclick="contactarWhatsApp('Información sobre paquete: Principiante')">Principiante</button>
                <button class="btn-service btn-package" onclick="contactarWhatsApp('Información sobre paquete: Intermedio')">Intermedio</button>
                <button class="btn-service btn-package" onclick="contactarWhatsApp('Información sobre paquete: Avanzado')">Avanzado</button>
                <button class="btn-service btn-package" onclick="contactarWhatsApp('Información sobre paquete: Licencia en mano')">Licencia en mano</button>
            </div>
        </div>
    </div>

    <div id="rental-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarAlquiler()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Alquiler de Vehículo</h3>
            <div class="service-grid">
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo B1')">B1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo B2')">B2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo B3')">B3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo B4')">B4</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo A1')">A1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo A2')">A2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo A3')">A3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Interés en alquilar un vehiculo C2')">C2</button>
            </div>
        </div>
    </div>

    <div id="services-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="cerrarServicios()"></i>
            <h3 style="margin:0; color:var(--rojo-principal); font-size: 1.2rem;">Otros Servicios</h3>
            <div class="service-grid">
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Renovación de licencia')"><i class="fas fa-id-card"></i> Renovación</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Permiso temporal')"><i class="fas fa-clock"></i> Permiso temporal</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Duplicado de licencia')"><i class="fas fa-copy"></i> Duplicado</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Cita teórica o práctica')"><i class="fas fa-calendar-alt"></i> Citas</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Cursos teóricos personalizados')"><i class="fas fa-graduation-cap"></i> Cursos Teóricos</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Resumen de motocicleta o automóvil')"><i class="fas fa-book"></i> Resúmenes</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Prescripción de infracciones')"><i class="fas fa-file-invoice"></i> Prescripción</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Asesoría legal tránsito')"><i class="fas fa-gavel"></i> Asesoría legal</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Dictamen médico')"><i class="fas fa-stethoscope"></i> Dictamen médico</button>
                <button class="btn-service" onclick="contactarWhatsApp('Info sobre: Pre-evaluación (Plantel réplica)')"><i class="fas fa-clipboard-check"></i> Pre-evaluación</button>
                <button class="btn-service" style="grid-column: span 2;" onclick="contactarWhatsApp('Info sobre: Reconocimiento de rutas')"><i class="fas fa-map-marked-alt"></i> Reconocimiento de rutas</button>
            </div>
        </div>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: var(--rojo-principal); font-weight: bold; margin-bottom: 8px; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status" class="status-badge"></div>
        <div class="score-circle" id="result-score"></div>
        <button class="btn" onclick="location.reload()">Regresar al inicio</button>
    </div>

    <footer id="mainFooter">
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        let preguntasSimulacro = [];
        let index = 0; let puntos = 0; let bloquearOpciones = false;
        const letrasOpciones = ['A', 'B', 'C', 'D'];

        window.onload = () => { window.history.pushState({ etapa: 'menu' }, ''); };

        window.onpopstate = function(event) {
            const quizVisible = document.getElementById('quiz-container').style.display === 'block';
            const modalAbierto = document.querySelector('.overlay.show');

            if (quizVisible) {
                if (confirm("¿Deseas salir del examen?")) { location.reload(); } 
                else { window.history.pushState({ etapa: 'examen' }, ''); }
            } else if (modalAbierto) {
                cerrarTodosModales();
            } else {
                // Comportamiento base
            }
        };

        function contactarWhatsApp(detalle) {
            const tel = "50672408103";
            const msg = `Hola vengo de la app Teórico CR. ${detalle}`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function registrarEstadoModal() { window.history.pushState({ etapa: 'modal' }, ''); }

        function abrirClases() { registrarEstadoModal(); document.getElementById('classes-overlay').classList.add('show'); }
        function cerrarClases() { document.getElementById('classes-overlay').classList.remove('show'); }

        function abrirAlquiler() { registrarEstadoModal(); document.getElementById('rental-overlay').classList.add('show'); }
        function cerrarAlquiler() { document.getElementById('rental-overlay').classList.remove('show'); }
        
        function abrirServicios() { registrarEstadoModal(); document.getElementById('services-overlay').classList.add('show'); }
        function cerrarServicios() { document.getElementById('services-overlay').classList.remove('show'); }

        function cerrarTodosModales() {
            cerrarClases(); cerrarAlquiler(); cerrarServicios();
            const inst = document.getElementById('install-overlay');
            if(inst) inst.classList.remove('show');
        }

        function iniciarExamen(tipo) {
            cerrarTodosModales();
            window.history.pushState({ etapa: 'examen' }, '');
            let fuente = (tipo === 'moto') ? (typeof bancoPreguntasMoto !== 'undefined' ? bancoPreguntasMoto : bancoPreguntasmoto) : bancoPreguntas;
            if (!fuente) { alert("Cargando preguntas..."); return; }
            preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `<span class="option-letter">${letrasOpciones[i]}</span> <span>${opt}</span>`;
                b.onclick = () => {
                    if (bloquearOpciones) return;
                    bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.classList.add('correct'); } 
                    else { b.classList.add('incorrect'); container.children[p.correcta].classList.add('correct'); }
                    setTimeout(() => { index++; if(index < 40) mostrarPregunta(); else finalizar(); }, 650);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }

        function finalizar() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('mainFooter').style.display = 'flex';
            const nota = Math.round((puntos / 40) * 100);
            document.getElementById('result-score').innerText = nota;
            let statusDiv = document.getElementById('result-status');
            let color = (nota <= 69) ? "var(--rojo-principal)" : "var(--verde-exito)";
            statusDiv.innerHTML = (nota <= 69) ? '<i class="fas fa-times-circle"></i> REPROBADO' : '<i class="fas fa-check-circle"></i> APROBADO';
            statusDiv.style.color = color;
            document.getElementById('result-score').style.color = color;
            if (nota === 100) dispararConfeti();
        }

        function dispararConfeti() {
            var end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#e31e24', '#28a745'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#e31e24', '#28a745'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
