<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body { overflow-x: hidden; margin: 0; padding: 0; background-color: var(--blanco); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; transition: background 0.3s; }
        body.fondo-auto { background: url('fondoexamen.jpeg') center/cover fixed no-repeat; background-color: rgba(255,255,255,0.8); background-blend-mode: overlay; }
        body.fondo-moto { background: url('fondomoto.jpeg') center/cover fixed no-repeat; background-color: rgba(255,255,255,0.8); background-blend-mode: overlay; }

        header { text-align: center; padding: 15px 10px; width: 100%; position: relative; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .app-logo { height: 80px; width: auto; } 
        .app-name-text { font-weight: bold; font-size: 1.5rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .section-title { font-weight: bold; font-size: 0.9rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; margin-bottom: 5px; border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px; }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn { background-color: var(--rojo-principal); color: white; border: none; padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: transform 0.1s; text-align: center; width: 100%; }
        .btn:active { transform: scale(0.97); }

        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        #question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #222; text-align: center; }
        .option-btn { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; text-align: left; font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: bold; color: var(--rojo-principal); min-width: 22px; }

        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        .score-circle { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        
        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px 0; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #eee; }
        .social-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; text-decoration: none; }
        .bg-whatsapp { background-color: var(--whatsapp); }
        .bg-facebook { background-color: var(--facebook); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba teórica</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>
        <p style="text-align:center; font-size: 0.8rem; color: #888;">Toca una opción para comenzar</p>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: var(--rojo-principal); font-weight: bold; margin-bottom: 8px; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status" style="font-size: 1.5rem; font-weight: bold;"></div>
        <div class="score-circle" id="result-score"></div>
        <button class="btn" onclick="location.reload()">Volver al inicio</button>
    </div>

    <footer id="mainFooter">
        <a href="https://wa.me/50672408103" class="social-circle bg-whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://facebook.com" class="social-circle bg-facebook"><i class="fab fa-facebook-f"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        // 1. CONFIGURACIÓN SUPABASE
        const supabaseUrl = 'https://vuaflankhxmsgeaiwcmz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1YWZsYW5raHhtc2dlYWl3Y216Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDE0NDQsImV4cCI6MjA4OTc3NzQ0NH0.EFbcma-3tEzAKUrW5i-1cg5hmJQPGXYTld-PJr5Jnac';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. FUNCIÓN DE REGISTRO (Al inicio)
        async function registrarEnContador(tipo) {
            try {
                const { error } = await supabaseClient
                    .from('contador') 
                    .insert([{ tipo_examen: tipo, fecha: new Date().toISOString() }]);
                if (error) console.error("Error guardando registro:", error);
            } catch (e) { console.error("Error de red:", e); }
        }

        // 3. LÓGICA DEL EXAMEN
        let preguntasSimulacro = [];
        let index = 0;
        let puntos = 0;
        let bloqueado = false;

        function iniciarExamen(tipo) {
            // REGISTRO INMEDIATO AL TOCAR EL BOTÓN
            registrarEnContador(tipo);

            // Cambios de interfaz
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';

            if(tipo === 'auto') {
                document.body.classList.add('fondo-auto');
                preguntasSimulacro = [...preguntas].sort(() => 0.5 - Math.random()).slice(0, 40);
            } else {
                document.body.classList.add('fondo-moto');
                preguntasSimulacro = [...preguntasMoto].sort(() => 0.5 - Math.random()).slice(0, 40);
            }
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloqueado = false;
            const q = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = q.pregunta;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.opciones.forEach((op, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65+i)}</span> <span>${op}</span>`;
                btn.onclick = () => verificarRespuesta(i, btn);
                container.appendChild(btn);
            });
        }

        function verificarRespuesta(opcionSeleccionada, btnElemento) {
            if(bloqueado) return;
            bloqueado = true;

            const correcta = preguntasSimulacro[index].correcta;
            const botones = document.querySelectorAll('.option-btn');

            if(opcionSeleccionada === correcta) {
                btnElemento.classList.add('correct');
                puntos++;
            } else {
                btnElemento.classList.add('incorrect');
                botones[correcta].classList.add('correct');
            }

            setTimeout(() => {
                index++;
                if(index < 40) {
                    mostrarPregunta();
                } else {
                    finalizarExamen();
                }
            }, 1200);
        }

        function finalizarExamen() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            
            const nota = Math.round((puntos / 40) * 100);
            document.getElementById('result-score').innerText = nota;
            document.getElementById('result-status').innerText = nota >= 80 ? "¡APROBADO! 🎉" : "REPROBADO ❌";
            
            if(nota >= 80) confetti();
        }
    </script>
</body>
</html>
