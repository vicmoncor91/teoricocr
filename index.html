<script>
    let preguntasSimulacro = [];
    let index = 0; let puntos = 0; let bloquearOpciones = false;
    const letrasOpciones = ['A', 'B', 'C', 'D'];
    let whatsappMsgGlobal = "";
    let whatsappNumGlobal = "50672408103";

    window.onload = () => { window.history.replaceState({ etapa: 'menu' }, ''); };

    window.onpopstate = function(event) {
        if (document.getElementById('quiz-container').style.display === 'block') {
            if (confirm("¿Deseas salir del examen?")) { location.reload(); } 
            else { window.history.pushState({ etapa: 'examen' }, ''); }
            return;
        }
        cerrarModalesYDetalles();
    };

    function cerrarModalesYDetalles() {
        document.querySelectorAll('.overlay').forEach(el => el.classList.remove('show'));
        document.getElementById('full-detail-page').classList.remove('show');
    }

    // --- MODALES CON RESET DE SCROLL ---
    function abrirClases() { 
        const modal = document.getElementById('classes-overlay');
        modal.querySelector('.popup-card').scrollTop = 0; // Sube al inicio del card
        window.history.pushState({ etapa: 'modal' }, ''); 
        modal.classList.add('show'); 
        window.scrollTo(0, 0); // Sube al inicio de la pantalla
    }

    function abrirAlquiler() { 
        const modal = document.getElementById('rental-overlay');
        modal.querySelector('.popup-card').scrollTop = 0;
        window.history.pushState({ etapa: 'modal' }, ''); 
        modal.classList.add('show'); 
        window.scrollTo(0, 0);
    }

    function abrirServicios() { 
        const modal = document.getElementById('services-overlay');
        modal.querySelector('.popup-card').scrollTop = 0;
        window.history.pushState({ etapa: 'modal' }, ''); 
        modal.classList.add('show'); 
        window.scrollTo(0, 0);
    }

    // --- VENTANA DE DETALLE CON RESET ---
    function mostrarVentanaDetalle(datos) {
        const detailPage = document.getElementById('full-detail-page');
        
        // Reset de scroll obligatorio
        detailPage.scrollTop = 0; 
        window.scrollTo(0, 0);

        // Limpieza de datos
        document.getElementById('p-img').src = "";
        document.getElementById('p-titulo').innerText = "Cargando...";
        document.getElementById('p-info').innerText = "";

        // Carga de datos
        document.getElementById('p-img').src = datos.imagen;
        document.getElementById('p-titulo').innerText = datos.titulo;
        document.getElementById('p-info').innerText = datos.info;
        
        whatsappMsgGlobal = datos.titulo;
        whatsappNumGlobal = datos.whatsapp || "50672408103";

        detailPage.classList.add('show');
        window.history.pushState({ etapa: 'detalle' }, '');
    }

    // --- EXAMEN CON RESET ---
    function iniciarExamen(tipo) {
        window.history.pushState({ etapa: 'examen' }, '');
        window.scrollTo(0, 0); // Asegura que el examen empiece arriba
        
        document.body.classList.remove('fondo-auto', 'fondo-moto');
        document.body.classList.add(tipo === 'auto' ? 'fondo-auto' : 'fondo-moto');
        
        let fuente = (tipo === 'moto') ? (typeof bancoPreguntasMoto !== 'undefined' ? bancoPreguntasMoto : bancoPreguntasmoto) : bancoPreguntas;
        preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
        index = 0; puntos = 0;
        
        document.getElementById('mainHeader').style.display = 'none';
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('mainFooter').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        mostrarPregunta();
    }

    function finalizar() {
        window.scrollTo(0, 0); // Sube para ver el resultado (nota)
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('mainFooter').style.display = 'flex';
        
        const nota = Math.round((puntos / 40) * 100);
        const scoreDiv = document.getElementById('result-score');
        const statusDiv = document.getElementById('result-status');
        const messageP = document.getElementById('result-message');
        
        scoreDiv.innerText = nota;
        let color = (nota <= 69) ? "var(--rojo-principal)" : "var(--verde-exito)";
        statusDiv.innerHTML = (nota <= 69) ? '<i class="fas fa-times-circle"></i> REPROBADO' : '<i class="fas fa-check-circle"></i> APROBADO';
        
        let msg = (nota <= 69) ? "Debes estudiar más." : (nota <= 85) ? "Bien. Pero puedes mejorar." : (nota <= 99) ? "Muy bien. Vas por buen camino." : "Serás un excelente conductor.";
        
        statusDiv.style.color = color;
        scoreDiv.style.color = color;
        messageP.innerText = msg;
        if (nota === 100) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    // El resto de funciones (abrirDetallePaquete, contactar, etc.) no cambian
    function abrirDetallePaquete(id) {
        const p = dataPaquetes[id];
        if (p) {
            mostrarVentanaDetalle({
                titulo: p.titulo,
                imagen: p.imagen,
                info: p.info,
                whatsapp: "50672408103"
            });
        }
    }
    // ... (Mantener el código de PWA al final igual)
</script>
