<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        header { text-align: center; padding: 15px 10px; width: 100%; }
        .header-top { display: flex; align-items: center; justify-content: center; }
        .app-logo { height: 100px; width: auto; margin-bottom: 10px; } 
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .section-title { font-weight: bold; font-size: 0.9rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; margin-bottom: 5px; border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px; }
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s; text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }
        .btn-outline { background-color: transparent; border: 2px solid var(--rojo-principal); color: var(--rojo-principal); }

        /* --- VENTANA DE INSTALACIÓN CENTRADA --- */
        #install-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }
        #install-overlay.show { display: flex; }
        #install-popup {
            width: 85%; max-width: 320px; background: white; border-radius: 20px;
            padding: 25px; text-align: center; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: popupIn 0.3s ease-out;
        }
        @keyframes popupIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-icon { width: 80px; height: 80px; border-radius: 15px; margin-bottom: 15px; }
        .popup-text b { display: block; font-size: 1.2rem; margin-bottom: 5px; }
        .popup-text span { display: block; font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .close-popup { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #aaa; cursor: pointer; }

        /* --- RESTO DE ESTILOS --- */
        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        #question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #222; text-align: center; }
        .option-btn { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f9; text-align: left; font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: bold; color: var(--rojo-principal); min-width: 22px; }
        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        .score-circle { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .status-badge { font-weight: bold; font-size: 1.4rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 0; display: flex; justify-content: center; gap: 35px; border-top: 1px solid #eee; z-index: 900;}
        footer a { font-size: 26px; text-decoration: none; }
        .fa-tiktok { color: var(--tiktok); } .fa-facebook { color: var(--facebook); } .fa-instagram { color: var(--instagram); } .fa-whatsapp { color: var(--whatsapp); }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <a href="https://wa.me/50672408103?text=Hola.%20Me%20interesan%20las%20Clases%20de%20manejo%20B1" class="btn">Clases de manejo B1</a>
        <a href="https://wa.me/50672408103?text=Hola.%20Quisiera%20consultar%20por%20el%20Alquiler%20de%20vehículos%20en%20San%20Ramón" class="btn">Alquiler de vehículos (San Ramón)</a>
        <a href="https://wa.me/50672408103?text=Hola.%20Quisiera%20más%20información%20sobre%20otros%20servicios" class="btn">Otros servicios</a>
        <a href="https://wa.me/50663784552?text=Hola.%20Asesoría%20sobre%20apelación%20o%20prescripción%20de%20infracciones" class="btn btn-dark">Apelación o prescripción de infracciones</a>
    </div>

    <div id="install-overlay">
        <div id="install-popup">
            <i class="fas fa-times close-popup" onclick="cerrarPopup()"></i>
            <img src="logo.png" class="popup-icon" alt="App Icon">
            <div class="popup-text">
                <b>Teórico CR</b>
                <span>Instala esta aplicación para estudiar sin interrupciones.</span>
            </div>
            <button id="btn-instalar-pwa" class="btn" style="width: 100%;">Instalar ahora</button>
        </div>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: var(--rojo-principal); font-weight: bold; margin-bottom: 8px; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status" class="status-badge"></div>
        <div class="score-circle" id="result-score"></div>
        <p id="result-message" style="font-size: 1.1rem; padding: 0 10px; font-weight: 500;"></p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
            <button class="btn" onclick="compartirResultado()"><i class="fas fa-share-alt"></i> Compartir resultado</button>
            <button class="btn btn-outline" onclick="location.reload()">Reintentar examen</button>
        </div>
    </div>

    <footer id="mainFooter">
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        let preguntasSimulacro = [];
        let index = 0; let puntos = 0; let bloquearOpciones = false;
        const letrasOpciones = ['A', 'B', 'C', 'D'];

        window.onload = () => { window.history.pushState({ etapa: 'menu' }, ''); };
        window.onpopstate = function(event) {
            if (document.getElementById('quiz-container').style.display === 'block') {
                if (confirm("¿Deseas salir del examen?")) { location.reload(); } 
                else { window.history.pushState({ etapa: 'examen' }, ''); }
            } else if (document.getElementById('result-container').style.display === 'block') {
                location.reload();
            }
        };

        // --- LÓGICA DE INSTALACIÓN ---
        let deferredPrompt;
        const installOverlay = document.getElementById('install-overlay');
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Reducido a 1 segundo para mayor rapidez
            setTimeout(() => {
                if(document.getElementById('mainMenu').style.display !== 'none') {
                    installOverlay.classList.add('show');
                }
            }, 1000);
        });

        document.getElementById('btn-instalar-pwa').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                cerrarPopup();
            }
        });
        function cerrarPopup() { installOverlay.classList.remove('show'); }

        // --- FUNCIONES DE EXAMEN ---
        function iniciarExamen(tipo) {
            cerrarPopup();
            window.history.pushState({ etapa: 'examen' }, '');
            let fuente = (tipo === 'moto') ? (window.bancoPreguntasMoto || window.bancoPreguntasmoto) : window.bancoPreguntas;
            if (!fuente) { alert("Error al cargar preguntas"); return; }
            preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `<span class="option-letter">${letrasOpciones[i]}</span> <span>${opt}</span>`;
                b.onclick = () => {
                    if (bloquearOpciones) return;
                    bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.classList.add('correct'); } 
                    else { b.classList.add('incorrect'); container.children[p.correcta].classList.add('correct'); }
                    setTimeout(() => { index++; if(index < 40) mostrarPregunta(); else finalizar(); }, 650);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }

        function finalizar() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('mainFooter').style.display = 'flex';
            const nota = Math.round((puntos / 40) * 100);
            const scoreDiv = document.getElementById('result-score');
            const statusDiv = document.getElementById('result-status');
            const messageP = document.getElementById('result-message');
            scoreDiv.innerText = nota;
            let msg = ""; let color = "";
            if (nota <= 69) {
                statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> REPROBADO';
                color = "var(--rojo-principal)"; msg = "Debes estudiar más.";
            } else {
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> APROBADO';
                color = "var(--verde-exito)";
                if (nota <= 85) msg = "Bien, pero puedes mejorar.";
                else if (nota <= 99) msg = "Muy bien. Vas por buen camino.";
                else { msg = "Serás un excelente conductor o conductora."; dispararConfeti(); }
            }
            statusDiv.style.color = color; scoreDiv.style.color = color; messageP.innerText = msg;
        }

        function dispararConfeti() {
            var duration = 3 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#e31e24', '#28a745'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#e31e24', '#28a745'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function compartirResultado() {
            const nota = document.getElementById('result-score').innerText;
            const text = `¡Saqué un ${nota} en mi simulacro de Teórico CR! 🚗💨`;
            if (navigator.share) navigator.share({ title: 'Resultado Teórico CR', text: text });
            else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
