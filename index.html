<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* FONDOS DINÁMICOS EXAMEN */
        body.fondo-auto { background: url('fondoexamen.jpeg') center/cover fixed no-repeat; background-color: rgba(255,255,255,0.8); background-blend-mode: overlay; }
        body.fondo-moto { background: url('fondomoto.jpeg') center/cover fixed no-repeat; background-color: rgba(255,255,255,0.8); background-blend-mode: overlay; }

        header { text-align: center; padding: 15px 10px; width: 100%; position: relative; }
        .btn-share-top { 
            position: absolute; top: 15px; right: 15px; 
            background: var(--gris-claro); color: var(--negro-suave);
            border: none; width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .app-logo { height: 80px; width: auto; } 
        .app-name-text { font-weight: bold; font-size: 1.5rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 90px; }
        .section-title { 
            font-weight: bold; font-size: 0.9rem; color: #555; 
            text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px; margin-bottom: 5px;
            border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px;
        }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }

        /* MODALES Y DETALLE */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .overlay.show { display: flex; }

        .popup-card {
            width: 90%; max-width: 360px; background: white;
            border-radius: 25px; padding: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative; animation: popIn 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .full-page-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .full-page-detail.show { display: flex; }

        .back-nav {
            position: sticky; top: 0; background: white; padding: 15px;
            display: flex; align-items: center; gap: 15px; font-weight: bold;
            border-bottom: 1px solid #eee; z-index: 10; cursor: pointer;
        }

        .detail-img { width: 100%; height: auto; display: block; }
        .detail-body { padding: 20px; text-align: left; padding-bottom: 100px; }
        .detail-title { color: var(--rojo-principal); margin-bottom: 10px; font-size: 1.3rem; font-weight: bold; }
        .detail-text { font-size: 1rem; line-height: 1.5; color: #333; white-space: pre-line; }

        .close-modal-x { position: absolute; top: 15px; right: 15px; font-size: 20px; color: #bbb; cursor: pointer; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-service, .btn-cat {
            background: #f8f9fa; border: 1.5px solid #eee; padding: 10px 5px;
            border-radius: 12px; font-weight: 600; color: var(--negro-suave);
            cursor: pointer; transition: all 0.2s; font-size: 0.75rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-service i { color: var(--rojo-principal); font-size: 1.1rem; }
        .btn-package { grid-column: span 2; padding: 15px; font-size: 1rem; }

        /* FOOTER ICONOS REDONDOS */
        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 10px 0; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #eee; z-index: 900;}
        .social-circle {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px; text-decoration: none;
        }
        .bg-tiktok { background-color: var(--tiktok); }
        .bg-facebook { background-color: var(--facebook); }
        .bg-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .bg-whatsapp { background-color: var(--whatsapp); }

        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        #question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #222; text-align: center; }
        .option-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #f9f9f9; text-align: left; 
            font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
        }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: bold; color: var(--rojo-principal); min-width: 22px; }

        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        .score-circle { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .status-badge { font-weight: bold; font-size: 1.4rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <button class="btn-share-top" onclick="compartirAppGeneral()">
            <i class="fas fa-share-nodes"></i>
        </button>
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba teórica</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <button class="btn" onclick="abrirClases()">Paquetes de Clases de Manejo</button>
        <button class="btn" onclick="abrirAlquiler()">Alquiler de vehículos (San Ramón)</button>
        <button class="btn" onclick="abrirServicios()">Otros servicios</button>
        <button class="btn btn-dark" onclick="abrirApelaciones()">Apelación o prescripción</button>
    </div>

    <div id="full-detail-page" class="full-page-detail">
        <div class="back-nav" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Volver
        </div>
        <img id="p-img" src="" alt="" class="detail-img">
        <div class="detail-body">
            <h3 id="p-titulo" class="detail-title"></h3>
            <div id="p-info" class="detail-text"></div>
            <button class="btn" style="width: 100%; margin-top: 25px;" onclick="contactarAccion()">
                <i class="fab fa-whatsapp"></i> Contactar
            </button>
        </div>
    </div>

    <div id="classes-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="window.history.back()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Paquetes de Manejo</h3>
            <div class="service-grid">
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('desdecero')">Desde cero</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('principiante')">Principiante</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('intermedio')">Intermedio</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('avanzado')">Avanzado</button>
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('enmano')">Licencia en mano</button>
            </div>
        </div>
    </div>

    <div id="rental-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="window.history.back()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal);">Alquiler de Vehículo</h3>
            <div class="service-grid">
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B1')">B1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B2')">B2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B3')">B3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler B4')">B4</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A1')">A1</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A2')">A2</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler A3')">A3</button>
                <button class="btn-cat" onclick="contactarWhatsApp('Alquiler C2')">C2</button>
            </div>
        </div>
    </div>

    <div id="services-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="window.history.back()"></i>
            <h3 style="margin:0; color:var(--rojo-principal); font-size: 1.2rem;">Otros Servicios</h3>
            <div class="service-grid">
                <button class="btn-service" onclick="contactarWhatsApp('Renovación')"><i class="fas fa-id-card"></i> Renovación</button>
                <button class="btn-service" onclick="contactarWhatsApp('Permiso temporal')"><i class="fas fa-clock"></i> Permiso</button>
                <button class="btn-service" onclick="contactarWhatsApp('Citas')"><i class="fas fa-calendar-alt"></i> Citas</button>
                <button class="btn-service" onclick="contactarWhatsApp('Dictamen médico')"><i class="fas fa-stethoscope"></i> Dictamen</button>
                <button class="btn-service" onclick="contactarWhatsApp('Traslado de expediente')"><i class="fas fa-file-export"></i> Traslado</button>
                <button class="btn-service" onclick="contactarWhatsApp('Homologación')"><i class="fas fa-globe"></i> Homologar</button>
            </div>
        </div>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: var(--rojo-principal); font-weight: bold; margin-bottom: 8px; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status" class="status-badge"></div>
        <div class="score-circle" id="result-score"></div>
        <p id="result-message" style="font-size: 1.1rem; padding: 0 10px; font-weight: 500;"></p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
            <button class="btn" onclick="compartirResultado()"><i class="fas fa-share-alt"></i> Compartir resultado</button>
            <button class="btn btn-outline" onclick="location.reload()">Reintentar examen</button>
        </div>
    </div>

    <footer id="mainFooter">
        <a href="https://www.tiktok.com/@christianescuelademanejo" target="_blank" class="social-circle bg-tiktok"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/share/1FY2w4BgwW/" target="_blank" class="social-circle bg-facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/escuelademanejocr.christian" target="_blank" class="social-circle bg-instagram"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103" target="_blank" class="social-circle bg-whatsapp"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script src="preguntasmoto.js"></script>

    <script>
        let preguntasSimulacro = [];
        let index = 0; let puntos = 0; let bloquearOpciones = false;
        const letrasOpciones = ['A', 'B', 'C', 'D'];
        let whatsappMsgGlobal = "";
        let whatsappNumGlobal = "50672408103";

        window.onload = () => { window.history.pushState({ etapa: 'menu' }, ''); };

        window.onpopstate = function(event) {
            if (document.getElementById('quiz-container').style.display === 'block') {
                if (confirm("¿Deseas salir del examen?")) { location.reload(); } 
                else { window.history.pushState({ etapa: 'examen' }, ''); }
                return;
            }
            cerrarModalesYDetalles();
        };

        function cerrarModalesYDetalles() {
            document.querySelectorAll('.overlay').forEach(el => el.classList.remove('show'));
            document.getElementById('full-detail-page').classList.remove('show');
        }

        function abrirClases() { window.history.pushState({ etapa: 'modal' }, ''); document.getElementById('classes-overlay').classList.add('show'); }
        function abrirAlquiler() { window.history.pushState({ etapa: 'modal' }, ''); document.getElementById('rental-overlay').classList.add('show'); }
        function abrirServicios() { window.history.pushState({ etapa: 'modal' }, ''); document.getElementById('services-overlay').classList.add('show'); }

        const dataPaquetes = {
            'desdecero': { 
                titulo: '🔴 Paquete 12 horas – Desde Cero', 
                imagen: 'desdecero.jpeg', 
                info: `Este paquete está pensado para personas que inician desde cero o que desean una preparación completa y sin estrés.\n\nAprenderás desde lo más básico hasta dominar todas las habilidades necesarias para aprobar con seguridad.\n\n🚗 Incluye:\n✔ 12 horas de práctica total\n✔ Vehículo para realizar la prueba\n✔ Entrenamiento progresivo paso a paso\n✔ Circuito réplica COSEVI\n✔ Rutas reales y simulación de examen\n✔ Acompañamiento completo\n\n💡 Perfecto si querés aprender bien desde el inicio y ganar confianza total.` 
            },
            'principiante': { 
                titulo: '🟠 Paquete 8 horas – Principiantes', 
                imagen: 'principiantes.jpeg', 
                info: `Una opción más intensiva para quienes quieren prepararse de forma completa y aumentar significativamente sus probabilidades de aprobar en el primer intento.\n\nAquí desarrollarás confianza, dominio del vehículo y control en diferentes situaciones reales.\n\n🚗 Incluye:\n✔ 8 horas de práctica intensiva\n✔ Vehículo para la prueba\n✔ Entrenamiento en circuito tipo COSEVI\n✔ Práctica en rutas reales\n✔ Corrección continua con instructor\n\n💡 Recomendado si querés sentirte seguro(a) en todo momento.` 
            },
            'intermedio': { 
                titulo: '🟡 Paquete 4 horas – Nivel Intermedio', 
                imagen: 'intermedio.jpeg', 
                info: `Este paquete está diseñado para personas que ya manejan, pero desean perfeccionar su técnica y aumentar su confianza antes del examen práctico.\n\nDurante las sesiones trabajarás rutas reales, maniobras clave y errores comunes que pueden hacerte perder la prueba.\n\n🚗 Incluye:\n✔ 4 horas de práctica\n✔ Vehículo para realizar la prueba\n✔ Simulación de examen\n✔ Identificación de posibles “trampas”\n✔ Tips prácticos para aprobar\n\n💡 Ideal para pulir detalles y asegurar un mejor resultado.` 
            },
            'avanzado': { 
                titulo: '🔹 Alquiler + 1 hora de práctica', 
                imagen: 'avanzado.jpeg', 
                info: `Si ya tenés conocimientos básicos pero querés reforzar tu seguridad al volante, esta opción es ideal para vos.\nEn esta sesión trabajarás maniobras específicas, corrección de errores y consejos clave para mejorar tu desempeño.\n\n🚗 Incluye:\n✔ 1 hora de práctica personalizada\n✔ Vehículo automático para realizar la prueba\n✔ Tips para mejorar tu técnica\n✔ Enfoque en puntos débiles\n\n💡 Perfecto para quienes necesitan un último ajuste antes de la prueba.` 
            },
            'enmano': { 
                titulo: '🎉 PAQUETE LICENCIA EN MANO 🎉', 
                imagen: 'enmano.jpeg', 
                info: `203.000,00 CRC 290.000,00 CRC\n\nOlvidate de complicaciones, nosotros nos encargamos de TODO para que salgas manejando con tu licencia en mano ✅\n\nEste paquete incluye:\n✔️ Enteros del banco ya pagos 🏦\n✔️ Citas gestionadas en COSEVI 📅\n✔️ Clases de manejo ILIMITADAS hasta que te sintás seguro/a 💪\n✔️ Vehículo cómodo y seguro para aprender 🚗\n✔️ Vehículo para el día de la prueba oficial 🏁\n✔️ Acompañamiento y asesoría en todo el proceso 🙌\n✔️ Material de apoyo y consejos prácticos para aprobar a la primera 📘✨\n\n🔥 ¡Un servicio integral pensado para que lo único que tengas que hacer sea aprender y ganar confianza al volante!\n\n📍 Contáctanos hoy y asegurá tu espacio, que las citas se agotan rápido.\n📲 WhatsApp: 7240-8103` 
            }
        };

        function abrirDetallePaquete(id) {
            const p = dataPaquetes[id];
            whatsappMsgGlobal = p.titulo; whatsappNumGlobal = "50672408103";
            document.getElementById('p-img').src = p.imagen;
            document.getElementById('p-titulo').innerText = p.titulo;
            document.getElementById('p-info').innerText = p.info;
            document.getElementById('full-detail-page').classList.add('show');
            window.history.pushState({ etapa: 'detalle' }, '');
        }

        function abrirApelaciones() {
            whatsappMsgGlobal = "Apelación de infracciones"; whatsappNumGlobal = "50663784552";
            document.getElementById('p-img').src = 'apelacion.png'; 
            document.getElementById('p-titulo').innerText = 'Apelación o Prescripción';
            document.getElementById('p-info').innerText = 'Asesoría legal.';
            document.getElementById('full-detail-page').classList.add('show');
            window.history.pushState({ etapa: 'detalle' }, '');
        }

        function contactarAccion() { contactarWhatsApp(whatsappMsgGlobal, whatsappNumGlobal); }

        function contactarWhatsApp(detalle, num = "50672408103") {
            window.open(`https://wa.me/${num}?text=${encodeURIComponent("Hola vengo de la app Teórico CR. Info sobre: " + detalle)}`, '_blank');
        }

        function compartirAppGeneral() {
            const text = `¡Practica con la App Teórico CR y aprueba tu examen! 🚗💨 https://abre.ai/teoricocr`;
            if (navigator.share) navigator.share({ text: text });
            else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        function iniciarExamen(tipo) {
            window.history.pushState({ etapa: 'examen' }, '');
            document.body.classList.remove('fondo-auto', 'fondo-moto');
            document.body.classList.add(tipo === 'auto' ? 'fondo-auto' : 'fondo-moto');
            let fuente = (tipo === 'moto') ? (typeof bancoPreguntasMoto !== 'undefined' ? bancoPreguntasMoto : bancoPreguntasmoto) : bancoPreguntas;
            preguntasSimulacro = [...fuente].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('mainFooter').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `<span class="option-letter">${letrasOpciones[i]}</span> <span>${opt}</span>`;
                b.onclick = () => {
                    if (bloquearOpciones) return; bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.classList.add('correct'); } 
                    else { b.classList.add('incorrect'); container.children[p.correcta].classList.add('correct'); }
                    setTimeout(() => { index++; if(index < 40) mostrarPregunta(); else finalizar(); }, 650);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }


        function finalizar() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('mainFooter').style.display = 'flex';
            const nota = Math.round((puntos / 40) * 100);
            const scoreDiv = document.getElementById('result-score');
            const statusDiv = document.getElementById('result-status');
            const messageP = document.getElementById('result-message');
            scoreDiv.innerText = nota;
            
            let color = (nota <= 69) ? "var(--rojo-principal)" : "var(--verde-exito)";
            statusDiv.innerHTML = (nota <= 69) ? '<i class="fas fa-times-circle"></i> REPROBADO' : '<i class="fas fa-check-circle"></i> APROBADO';
            
            let msg = "";
            if (nota <= 69) msg = "Debes estudiar más.";
            else if (nota <= 85) msg = "Bien. Pero puedes mejorar.";
            else if (nota <= 99) msg = "Muy bien. Vas por buen camino.";
            else msg = "Serás un excelente conductor o conductora.";

            statusDiv.style.color = color;
            scoreDiv.style.color = color;
            messageP.innerText = msg;
            if (nota === 100) dispararConfeti();
        }

        function compartirResultado() {
            const nota = document.getElementById('result-score').innerText;
            const text = `¡Saqué un ${nota} en mi simulacro de Teórico CR! 🚗💨. Intentalo tú aquí: https://abre.ai/teoricocr`;
            if (navigator.share) navigator.share({ text: text });
