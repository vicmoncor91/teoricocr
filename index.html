<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-principal: #e31e24;
            --blanco: #ffffff;
            --negro-suave: #333;
        }

        /* Bloqueo de scroll lateral */
        html, body {
            overflow-x: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            padding: 0;
        }

        /* Banner de Instalación superior */
        #installBanner {
            display: none;
            width: 100%;
            background: var(--negro-suave);
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            z-index: 1000;
        }
        #btnInstall {
            background: var(--rojo-principal);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        header {
            text-align: center;
            padding: 15px 10px 10px 10px;
            flex-shrink: 0;
        }

        .header-title { color: #333; margin: 0; font-size: 1.2rem; font-weight: bold; line-height: 1; }
        .header-subtitle { color: #666; font-size: 0.9rem; margin-top: 2px; }
        
        .app-logo {
            height: 55px; /* Logo más pequeño como pediste */
            width: auto;
            margin: 8px auto;
            display: block;
        }

        .app-name-text { font-weight: bold; font-size: 1.1rem; color: #000; }

        /* Contenedor de botones optimizado */
        .menu-container {
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Espacio que hace que "respire" cada botón */
            padding-bottom: 90px;
        }

        /* Grid de Exámenes */
        .exam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background-color: var(--rojo-principal);
            color: white;
            border: none;
            padding: 14px 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-dark { background-color: var(--negro-suave); }

        /* Footer Redes Sociales fijo */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 35px;
            border-top: 1px solid #eee;
        }

        footer a { color: #555; font-size: 24px; text-decoration: none; }
        .fa-whatsapp { color: #25D366; }
    </style>
</head>
<body>

    <div id="installBanner">
        ¿Instalar Teórico CR en tu inicio? 
        <button id="btnInstall">INSTALAR</button>
    </div>

    <header>
        <div class="header-title">Escuela de manejo CR</div>
        <div class="header-subtitle">San Ramón</div>
        <img src="logo.png" alt="Teórico CR" class="app-logo">
        <div class="app-name-text">Teórico CR</div>
    </header>

    <div class="menu-container">
        
        <div class="exam-grid">
            <a href="#" class="btn"><i class="fas fa-motorcycle"></i> Moto</a>
            <a href="#" class="btn"><i class="fas fa-car"></i> Auto</a>
        </div>

        <a href="https://wa.me/50672408103?text=Hola.%20Quisiera%20más%20información%20sobre%20el%20Curso%20virtual%20personalizado" class="btn">Curso Virtual Personalizado</a>
        <a href="https://wa.me/50672408103?text=Hola.%20Quisiera%20más%20información%20sobre%20el%20Material%20didáctico%20resumido" class="btn">Material Didáctico Resumido</a>
        <a href="#" class="btn">Clases de Manejo B1</a>
        <a href="#" class="btn">Alquiler San Ramón</a>
        <a href="https://wa.me/50663784552?text=Hola.%20Necesito%20asesoría%20sobre%20apelación%20o%20prescripción%20de%20infracciones" class="btn btn-dark">Apelación de Infracciones</a>
        <a href="#" class="btn">Otros Servicios</a>

    </div>

    <footer>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', () => {
            installBanner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                deferredPrompt = null;
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
