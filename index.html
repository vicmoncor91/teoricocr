<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
        }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        /* Encabezado Compacto */
        header { text-align: center; padding: 10px; width: 100%; }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .app-logo { height: 40px; }
        .app-name-text { font-weight: bold; font-size: 1.2rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; line-height: 1.2; }

        .menu-container { width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        .section-title { 
            font-weight: bold; 
            font-size: 0.9rem; 
            color: #555; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-top: 10px;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--gris-claro);
            padding-bottom: 5px;
        }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 14px 10px; border-radius: 12px; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-decoration: none; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-dark { background-color: var(--negro-suave); }
        .btn-outline { background-color: transparent; border: 2px solid var(--rojo-principal); color: var(--rojo-principal); }

        /* Pop-up de Instalación PWA */
        #install-popup {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            border-radius: 20px 20px 0 0; padding: 15px;
            display: flex; align-items: center; gap: 15px;
            z-index: 1001; transition: bottom 0.5s ease;
        }
        #install-popup.show { bottom: 0; }
        .popup-icon { width: 50px; height: 50px; border-radius: 10px; }
        .popup-text { flex: 1; }
        .popup-text b { display: block; font-size: 0.95rem; }
        .popup-text span { font-size: 0.8rem; color: #666; }
        .close-popup { font-size: 20px; color: #ccc; cursor: pointer; padding: 5px; }

        /* Estilos Examen */
        #quiz-container { width: 90%; max-width: 400px; display: none; padding: 20px 0; }
        #question-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #222; text-align: center; }
        
        .option-btn {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #f9f9f9; text-align: left; 
            font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
            transition: all 0.2s ease;
        }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: bold; color: var(--rojo-principal); min-width: 22px; }

        /* Pantalla Resultados */
        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 20px 0; }
        .score-circle { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: var(--rojo-principal); }
        .status-badge { font-weight: bold; font-size: 1.4rem; margin-bottom: 15px; }

        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 0; display: flex; justify-content: center; gap: 35px; border-top: 1px solid #eee; z-index: 900;}
        footer a { color: #555; font-size: 24px; text-decoration: none; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="school-info"><b>Escuela de manejo CR</b><br>San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen()"><i class="fas fa-motorcycle"></i> Moto</button>
            <button class="btn" onclick="iniciarExamen()"><i class="fas fa-car"></i> Auto</button>
        </div>

        <div class="section-title">Servicios y Material</div>
        <a href="https://wa.me/50672408103?text=Hola.%20Quisiera%20más%20información%20sobre%20el%20Curso%20virtual%20personalizado" class="btn">Curso Virtual Personalizado</a>
        <a href="https://wa.me/50672408103?text=Hola.%20Estoy%20utilizando%20la%20app%20Teórico%20CR.%20Quisiera%20más%20información%20sobre%20el%20Material%20didáctico%20resumido" class="btn">Material Didáctico Resumido</a>
        <a href="#" class="btn">Clases de Manejo B1</a>
        <a href="#" class="btn">Alquiler San Ramón</a>
        <a href="https://wa.me/50663784552?text=Hola.%20Asesoría%20infracciones" class="btn btn-dark">Apelación de Infracciones</a>
    </div>

    <div id="install-popup">
        <img src="logo.png" class="popup-icon" alt="App Icon">
        <div class="popup-text">
            <b>Teórico CR</b>
            <span>Instala esta app en tu inicio</span>
        </div>
        <button id="btn-instalar-pwa" class="btn" style="padding: 8px 15px; font-size: 13px;">Instalar</button>
        <i class="fas fa-times close-popup" onclick="cerrarPopup()"></i>
    </div>

    <div id="quiz-container">
        <div id="question-number" style="color: #e31e24; font-weight: bold; margin-bottom: 8px; text-align: center;"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-container">
        <div id="result-status" class="status-badge"></div>
        <div class="score-circle" id="result-score"></div>
        <p id="result-message" style="font-size: 1.1rem; padding: 0 10px;"></p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 25px;">
            <button class="btn" onclick="compartirResultado()"><i class="fas fa-share-alt"></i> Compartir resultado</button>
            <button class="btn btn-outline" onclick="location.reload()">Reintentar examen</button>
        </div>
    </div>

    <footer>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script src="preguntas.js"></script>
    <script>
        let preguntasSimulacro = [];
        let index = 0;
        let puntos = 0;
        let bloquearOpciones = false;
        const letrasOpciones = ['A', 'B', 'C', 'D'];

        // --- LÓGICA DE INSTALACIÓN PWA ---
        let deferredPrompt;
        const installPopup = document.getElementById('install-popup');
        const btnInstalar = document.getElementById('btn-instalar-pwa');

        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostrar pop-up a los 3 segundos de entrar
            setTimeout(() => {
                if(document.getElementById('mainMenu').style.display !== 'none') {
                    installPopup.classList.add('show');
                }
            }, 3000);
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                cerrarPopup();
            } else {
                alert("Para instalar en iOS: Toca 'Compartir' y luego 'Añadir a pantalla de inicio'.");
            }
        });

        function cerrarPopup() {
            installPopup.classList.remove('show');
        }
        // --------------------------------

        function iniciarExamen() {
            cerrarPopup();
            if (typeof bancoPreguntas === 'undefined') { alert("Error: No se encontró el archivo de preguntas."); return; }
            preguntasSimulacro = [...bancoPreguntas].sort(() => 0.5 - Math.random()).slice(0, 40);
            index = 0; puntos = 0;
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            mostrarPregunta();
        }

        function mostrarPregunta() {
            bloquearOpciones = false;
            const p = preguntasSimulacro[index];
            document.getElementById('question-number').innerText = `PREGUNTA ${index + 1} DE 40`;
            document.getElementById('question-text').innerText = p.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            p.opciones.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerHTML = `<span class="option-letter">${letrasOpciones[i]}</span> <span>${opt}</span>`;
                b.onclick = () => {
                    if (bloquearOpciones) return;
                    bloquearOpciones = true;
                    if(i === p.correcta) { puntos++; b.classList.add('correct'); }
                    else { b.classList.add('incorrect'); container.children[p.correcta].classList.add('correct'); }
                    setTimeout(() => {
                        index++;
                        if(index < 40) mostrarPregunta(); else finalizar();
                    }, 600);
                };
                container.appendChild(b);
            });
            window.scrollTo(0,0);
        }

        function finalizar() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            const nota = Math.round((puntos / 40) * 100);
            document.getElementById('result-score').innerText = nota;
            const st = document.getElementById('result-status');
            if (nota < 70) { st.innerText = "REPROBADO"; st.style.color = "red"; }
            else { st.innerText = "APROBADO"; st.style.color = "green"; }
        }

        function compartirResultado() {
            const nota = document.getElementById('result-score').innerText;
            const text = `¡Saqué un ${nota} en mi simulacro de Teórico CR!`;
            if (navigator.share) { navigator.share({ title: 'Resultado Teórico CR', text: text }); }
            else { window.open(`https://wa.me/?text=${encodeURIComponent(text)}`); }
        }
    </script>
</body>
</html>
