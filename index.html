<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rojo-principal: #e31e24;
            --verde-exito: #28a745;
            --blanco: #ffffff;
            --negro-suave: #333;
            --gris-claro: #f4f4f4;
            --tiktok: #000000;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            overflow-x: hidden;
            margin: 0; padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        body { display: flex; flex-direction: column; align-items: center; }

        /* Fondos dinámicos */
        body.fondo-auto { background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('fondoexamen.jpeg') center/cover fixed no-repeat; }
        body.fondo-moto { background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('fondomoto.jpeg') center/cover fixed no-repeat; }

        header { text-align: center; padding: 20px 10px; width: 100%; position: relative; background: white; }
        .btn-share-top { 
            position: absolute; top: 15px; right: 15px; 
            background: var(--gris-claro); color: var(--negro-suave);
            border: none; width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }
        .header-top { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 5px; }
        .app-logo { height: 70px; width: auto; } 
        .app-name-text { font-weight: 800; font-size: 1.6rem; color: #000; }
        .school-info { color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .menu-container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; margin-top: 10px; }
        .section-title { 
            font-weight: 800; font-size: 0.85rem; color: #888; 
            text-transform: uppercase; letter-spacing: 1.2px;
            margin-top: 15px; margin-bottom: 5px;
            border-bottom: 2px solid var(--gris-claro); padding-bottom: 5px;
        }
        
        .exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn {
            background-color: var(--rojo-principal); color: white; border: none;
            padding: 16px 12px; border-radius: 15px; font-size: 15px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(227, 30, 36, 0.2);
        }
        .btn:active { transform: scale(0.96); box-shadow: none; }
        .btn-dark { background-color: var(--negro-suave); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Overlays y Modales */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .overlay.show { display: flex; }

        .popup-card {
            width: 90%; max-width: 380px; background: white;
            border-radius: 28px; padding: 25px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .full-page-detail {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none;
            flex-direction: column; overflow-y: auto;
        }
        .full-page-detail.show { display: flex; }

        .back-nav {
            position: sticky; top: 0; background: white; padding: 18px;
            display: flex; align-items: center; gap: 15px; font-weight: 700;
            border-bottom: 1px solid #eee; z-index: 10; cursor: pointer;
        }

        .detail-img { width: 100%; height: auto; max-height: 250px; object-fit: cover; }
        .detail-body { padding: 25px; text-align: left; padding-bottom: 120px; }
        .detail-title { color: var(--rojo-principal); margin-bottom: 15px; font-size: 1.4rem; font-weight: 800; }
        .detail-text { font-size: 1rem; line-height: 1.6; color: #444; white-space: pre-line; }

        .close-modal-x { position: absolute; top: 18px; right: 20px; font-size: 22px; color: #ccc; cursor: pointer; padding: 5px; }

        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-service, .btn-cat {
            background: #fdfdfd; border: 2px solid #f0f0f0; padding: 12px 8px;
            border-radius: 16px; font-weight: 700; color: var(--negro-suave);
            cursor: pointer; transition: all 0.2s; font-size: 0.78rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-service:active, .btn-cat:active { background: #f0f0f0; border-color: #ddd; }
        .btn-service i { color: var(--rojo-principal); font-size: 1.3rem; }
        .btn-package { grid-column: span 2; padding: 18px; font-size: 1rem; border-color: #eee; }

        footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 12px 0; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #eee; z-index: 900;}
        .social-circle {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 22px; text-decoration: none;
            transition: transform 0.2s;
        }
        .social-circle:active { transform: scale(0.9); }
        .bg-tiktok { background-color: var(--tiktok); }
        .bg-facebook { background-color: var(--facebook); }
        .bg-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .bg-whatsapp { background-color: var(--whatsapp); }

        /* Estilos del Quiz */
        #quiz-container { width: 92%; max-width: 450px; display: none; padding: 25px 0; margin-top: 20px; }
        #question-text { font-weight: 700; font-size: 1.2rem; margin-bottom: 25px; color: #222; text-align: center; line-height: 1.4; }
        .option-btn {
            width: 100%; padding: 18px; margin-bottom: 14px; border-radius: 16px;
            border: 2px solid #eee; background: white; text-align: left; 
            font-size: 1rem; cursor: pointer; display: flex; align-items: flex-start; gap: 15px;
            transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--verde-exito) !important; color: #155724 !important; font-weight: 600; }
        .option-btn.incorrect { background-color: #f8d7da !important; border-color: var(--rojo-principal) !important; color: #721c24 !important; }
        .option-letter { font-weight: 800; color: var(--rojo-principal); min-width: 25px; }

        #result-container { width: 90%; max-width: 400px; text-align: center; display: none; padding: 30px 0; }
        .score-circle { font-size: 4rem; font-weight: 900; margin: 15px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }
        .status-badge { font-weight: 800; font-size: 1.6rem; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .btn-outline { background: transparent; border: 2px solid var(--rojo-principal); color: var(--rojo-principal); box-shadow: none; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <button class="btn-share-top" onclick="compartirAppGeneral()">
            <i class="fas fa-share-nodes"></i>
        </button>
        <div class="school-info"><b>Escuela de manejo CR</b> • San Ramón</div>
        <div class="header-top">
            <img src="logo.png" alt="Logo" class="app-logo">
            <div class="app-name-text">Teórico CR</div>
        </div>
    </header>

    <div class="menu-container" id="mainMenu">
        <div class="section-title">Simulación de prueba</div>
        <div class="exam-grid">
            <button class="btn" onclick="iniciarExamen('moto')"><i class="fas fa-motorcycle"></i> Motocicleta</button>
            <button class="btn" onclick="iniciarExamen('auto')"><i class="fas fa-car"></i> Automóvil</button>
        </div>

        <div class="section-title">Nuestros Servicios</div>
        <button class="btn" onclick="abrirClases()">Paquetes de Clases de Manejo</button>
        <button class="btn" onclick="abrirAlquiler()">Alquiler de vehículos (San Ramón)</button>
        <button class="btn" onclick="abrirServicios()">Otros servicios</button>
        <button class="btn btn-dark" onclick="abrirApelaciones()">Apelación o prescripción</button>
    </div>

    <div id="full-detail-page" class="full-page-detail">
        <div class="back-nav" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Volver al menú
        </div>
        <img id="p-img" src="" alt="" class="detail-img">
        <div class="detail-body">
            <h3 id="p-titulo" class="detail-title"></h3>
            <div id="p-info" class="detail-text"></div>
            <button class="btn" style="width: 100%; margin-top: 30px;" onclick="contactarAccion()">
                <i class="fab fa-whatsapp"></i> Solicitar Información
            </button>
        </div>
    </div>

    <div id="classes-overlay" class="overlay">
        <div class="popup-card">
            <i class="fas fa-times close-modal-x" onclick="window.history.back()"></i>
            <h3 style="margin-top:0; color:var(--rojo-principal); font-weight: 800;">Paquetes de Manejo</h3>
            <div class="service-grid">
                <button class="btn-service btn-package" onclick="abrirDetallePaquete('desdecero')">Desde cero</button>
                <button class="btn-service btn-package"
