<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-principal: #e31e24;
            --blanco: #ffffff;
            --gris-suave: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanco);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Banner de Instalación */
        #installBanner {
            display: none;
            width: 100%;
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        #btnInstall {
            background: var(--rojo-principal);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-left: 10px;
            font-weight: bold;
        }

        header {
            text-align: center;
            padding: 20px 10px;
            width: 100%;
        }

        .header-title { color: #333; margin: 0; font-size: 1.4rem; font-weight: bold; }
        .header-subtitle { color: #666; font-size: 1rem; margin-bottom: 10px; }
        
        /* Ajuste del Logo */
        .app-logo {
            height: 80px; /* Tamaño más cómodo */
            width: auto;
            margin: 10px 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }

        /* Títulos de sección sutiles */
        .section-label {
            font-size: 12px;
            font-weight: bold;
            color: #999;
            text-transform: uppercase;
            margin-bottom: -5px;
            margin-top: 10px;
        }

        /* Grid de Exámenes */
        .exam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background-color: var(--rojo-principal);
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-dark { background-color: #333; }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-top: 1px solid #eee;
        }

        footer a { color: #555; font-size: 26px; text-decoration: none; }
        .fa-whatsapp { color: #25D366; }
    </style>
</head>
<body>

    <div id="installBanner">
        ¿Quieres la App en tu inicio? 
        <button id="btnInstall">INSTALAR</button>
    </div>

    <header>
        <div class="header-title">Escuela de manejo CR</div>
        <div class="header-subtitle">San Ramón</div>
        <img src="logo.png" alt="Teórico CR" class="app-logo">
        <div style="font-weight: bold; font-size: 1.2rem;">Teórico CR</div>
    </header>

    <div class="menu-container">
        
        <div class="section-label">Simuladores</div>
        <div class="exam-grid">
            <a href="#" class="btn"><i class="fas fa-motorcycle"></i> Moto</a>
            <a href="#" class="btn"><i class="fas fa-car"></i> Auto</a>
        </div>

        <div class="section-label">Servicios WhatsApp</div>
        <a href="https://wa.me/50672408103?text=Información Curso" class="btn">Curso Virtual Personalizado</a>
        <a href="https://wa.me/50672408103?text=Información Material" class="btn">Material Didáctico Resumido</a>
        
        <div class="section-label">Clases y Alquiler</div>
        <a href="#" class="btn">Clases de Manejo B1</a>
        <a href="#" class="btn">Alquiler San Ramón</a>

        <div class="section-label">Legal</div>
        <a href="https://wa.me/50663784552" class="btn btn-dark">Apelación de Infracciones</a>
        <a href="#" class="btn">Otros Servicios</a>

    </div>

    <footer>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', () => {
            document.getElementById('installBanner').style.display = 'none';
            deferredPrompt.prompt();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
