<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teórico CR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --rojo-principal: #e31e24;
            --blanco: #ffffff;
            --negro-suave: #333;
        }

        /* Bloqueo de scroll lateral */
        html, body {
            overflow-x: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--blanco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

<div id="quiz-container" style="display:none; width: 90%; max-width: 400px; margin-top: 20px;">
    <div id="question-number" style="font-size: 0.8rem; color: #666; margin-bottom: 5px;"></div>
    <div id="question-text" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 20px;"></div>
    <div id="options-container" style="display: flex; flex-direction: column; gap: 10px;"></div>
</div>

<div id="result-container" style="display:none; text-align: center; width: 90%; max-width: 400px; margin-top: 50px;">
    <h2 id="result-score"></h2>
    <p id="result-message" style="font-size: 1.2rem; font-weight: bold;"></p>
    <button onclick="location.reload()" class="btn" style="margin-top: 20px; width: 100%;">Volver al Inicio</button>
</div>

<script src="preguntas.js"></script>
<script>
    let preguntasSeleccionadas = [];
    let indiceActual = 0;
    let aciertos = 0;

    // Función para iniciar el examen de Auto
    document.querySelector('.btn i.fa-car').parentElement.onclick = function(e) {
        e.preventDefault();
        iniciarExamen();
    };

    function iniciarExamen() {
        // Seleccionar 40 al azar
        preguntasSeleccionadas = [...bancoPreguntas].sort(() => 0.5 - Math.random()).slice(0, 40);
        indiceActual = 0;
        aciertos = 0;
        
        document.querySelector('.menu-container').style.display = 'none';
        document.querySelector('header').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const p = preguntasSeleccionadas[indiceActual];
        document.getElementById('question-number').innerText = `Pregunta ${indiceActual + 1} de 40`;
        document.getElementById('question-text').innerText = p.pregunta;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        p.opciones.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.backgroundColor = '#eee';
            btn.style.color = '#333';
            btn.style.justifyContent = 'flex-start';
            btn.innerText = opt;
            btn.onclick = () => verificarRespuesta(i);
            container.appendChild(btn);
        });
    }

    function verificarRespuesta(opcionElegida) {
        if (opcionElegida === preguntasSeleccionadas[indiceActual].correcta) {
            aciertos++;
        }
        
        indiceActual++;
        if (indiceActual < 40) {
            mostrarPregunta();
        } else {
            mostrarResultado();
        }
    }

    function mostrarResultado() {
        document.getElementById('quiz-container').style.display = 'none';
        const resCon = document.getElementById('result-container');
        resCon.style.display = 'block';
        
        const porcentaje = Math.round((aciertos / 40) * 100);
        document.getElementById('result-score').innerText = `${porcentaje}% (${aciertos}/40)`;
        
        const msg = document.getElementById('result-message');
        if (porcentaje >= 70) {
            msg.innerText = "¡Felicidades! Has aprobado el examen.";
            msg.style.color = "green";
        } else {
            msg.innerText = "Debes estudiar más. Sigue practicando.";
            msg.style.color = "red";
        }
    }
</script>
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
            padding: 0;
        }

        /* Banner de Instalación superior */
        #installBanner {
            display: none;
            width: 100%;

            color: white;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            z-index: 1000;
        }
        #btnInstall {
            background: var(--rojo-principal);

            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        header {
            text-align: center;
            padding: 15px 10px 10px 10px;
            flex-shrink: 0;
        }

        .header-title { color: #333; margin: 0; font-size: 1.2rem; font-weight: bold; line-height: 1; }
        .header-subtitle { color: #666; font-size: 0.9rem; margin-top: 2px; }
        
        .app-logo {
            height: 55px; /* Logo más pequeño como pediste */
            width: auto;
            margin: 8px auto;
            display: block;
        }

        .app-name-text { font-weight: bold; font-size: 1.1rem; color: #000; }

        /* Contenedor de botones optimizado */
        .menu-container {
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Espacio que hace que "respire" cada botón */
            padding-bottom: 90px;
        }

        /* Grid de Exámenes */
        .exam-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background-color: var(--rojo-principal);
            color: white;
            border: none;
            padding: 14px 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-dark { background-color: var(--negro-suave); }

        /* Footer Redes Sociales fijo */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 12px 0;
            display: flex;
            justify-content: center;
            gap: 35px;
            border-top: 1px solid #eee;
        }

        footer a { color: #555; font-size: 24px; text-decoration: none; }
        .fa-whatsapp { color: #25D366; }
    </style>
</head>

    <footer>

        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="https://wa.me/50672408103"><i class="fab fa-whatsapp"></i></a>
    </footer>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', () => {
            installBanner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                deferredPrompt = null;
            });
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
